server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

url-shortener:
  default-expiration-minutes: 5
  base-url: http://localhost:8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
